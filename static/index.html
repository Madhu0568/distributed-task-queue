<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Queue Monitor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #e2e8f0; padding: 20px; }
        h1 { text-align: center; margin-bottom: 20px; color: #38bdf8; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .card { background: #1e293b; border-radius: 12px; padding: 20px; text-align: center; border: 1px solid #334155; }
        .card .value { font-size: 2.5em; font-weight: bold; color: #38bdf8; }
        .card .label { color: #94a3b8; margin-top: 5px; font-size: 0.9em; }
        .section { background: #1e293b; border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid #334155; }
        .section h2 { color: #38bdf8; margin-bottom: 15px; font-size: 1.2em; }
        .worker-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 10px; }
        .worker { background: #0f172a; border-radius: 8px; padding: 15px; }
        .worker .name { font-weight: bold; margin-bottom: 8px; }
        .status-idle { color: #22c55e; }
        .status-busy { color: #f59e0b; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #334155; }
        th { color: #94a3b8; font-weight: 600; }
        .badge { padding: 3px 10px; border-radius: 12px; font-size: 0.8em; font-weight: 600; }
        .badge-queued { background: #1e40af; color: #93c5fd; }
        .badge-running { background: #854d0e; color: #fde047; }
        .badge-completed { background: #166534; color: #86efac; }
        .badge-failed { background: #991b1b; color: #fca5a5; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
        button { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.9em; transition: opacity 0.2s; }
        button:hover { opacity: 0.85; }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-success { background: #22c55e; color: white; }
        .btn-warning { background: #f59e0b; color: #1e293b; }
        .refresh-info { text-align: center; color: #64748b; font-size: 0.85em; margin-bottom: 15px; }
    </style>
</head>
<body>
    <h1>Distributed Task Queue Monitor</h1>
    <p class="refresh-info">Auto-refreshes every 2 seconds</p>

    <div class="controls">
        <button class="btn-primary" onclick="submitTask('compute', {number: 1000}, 'high')">Submit Compute Task</button>
        <button class="btn-success" onclick="submitTask('transform', {text: 'Hello World from Task Queue'}, 'medium')">Submit Transform Task</button>
        <button class="btn-warning" onclick="submitTask('aggregate', {values: [10,20,30,40,50]}, 'low')">Submit Aggregate Task</button>
        <button class="btn-primary" onclick="submitBatch()">Submit Batch (10 tasks)</button>
    </div>

    <div class="grid">
        <div class="card"><div class="value" id="queue-depth">0</div><div class="label">Queue Depth</div></div>
        <div class="card"><div class="value" id="total-tasks">0</div><div class="label">Total Tasks</div></div>
        <div class="card"><div class="value" id="completed">0</div><div class="label">Completed</div></div>
        <div class="card"><div class="value" id="failed">0</div><div class="label">Failed</div></div>
    </div>

    <div class="section">
        <h2>Worker Status</h2>
        <div class="worker-grid" id="workers"></div>
    </div>

    <div class="section">
        <h2>Recent Tasks</h2>
        <table>
            <thead><tr><th>ID</th><th>Type</th><th>Priority</th><th>Status</th><th>Worker</th><th>Retries</th></tr></thead>
            <tbody id="task-table"></tbody>
        </table>
    </div>

    <script>
        async function fetchMonitor() {
            try {
                const res = await fetch('/api/monitor');
                const data = await res.json();
                document.getElementById('queue-depth').textContent = data.queue_depth;
                document.getElementById('total-tasks').textContent = data.total_tasks;
                document.getElementById('completed').textContent = data.completed;
                document.getElementById('failed').textContent = data.failed;

                const workersDiv = document.getElementById('workers');
                workersDiv.innerHTML = '';
                for (const [name, info] of Object.entries(data.workers)) {
                    workersDiv.innerHTML += `
                        <div class="worker">
                            <div class="name">${name}</div>
                            <div>Status: <span class="status-${info.status}">${info.status.toUpperCase()}</span></div>
                            <div>Current: ${info.current_task || 'None'}</div>
                            <div>Completed: ${info.tasks_completed}</div>
                        </div>`;
                }
            } catch (e) {}
        }

        async function fetchTasks() {
            try {
                const res = await fetch('/api/tasks');
                const data = await res.json();
                const tbody = document.getElementById('task-table');
                tbody.innerHTML = '';
                const sorted = data.tasks.sort((a, b) => new Date(b.created_at) - new Date(a.created_at)).slice(0, 20);
                for (const t of sorted) {
                    tbody.innerHTML += `
                        <tr>
                            <td>${t.task_id}</td>
                            <td>${t.task_type}</td>
                            <td>${t.priority}</td>
                            <td><span class="badge badge-${t.status}">${t.status}</span></td>
                            <td>${t.worker_id || '-'}</td>
                            <td>${t.retries}</td>
                        </tr>`;
                }
            } catch (e) {}
        }

        async function submitTask(type, payload, priority) {
            await fetch('/api/tasks', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({task_type: type, payload: payload, priority: priority})
            });
        }

        async function submitBatch() {
            const tasks = [];
            for (let i = 0; i < 10; i++) {
                tasks.push({
                    task_type: ['compute', 'transform', 'aggregate'][i % 3],
                    payload: i % 3 === 0 ? {number: 100 + i * 10} : i % 3 === 1 ? {text: `Batch item ${i}`} : {values: [i, i*2, i*3]},
                    priority: ['high', 'medium', 'low'][i % 3]
                });
            }
            await fetch('/api/tasks/batch', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({tasks: tasks})
            });
        }

        setInterval(() => { fetchMonitor(); fetchTasks(); }, 2000);
        fetchMonitor();
        fetchTasks();
    </script>
</body>
</html>
